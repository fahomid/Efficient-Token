name: Bug report
description: Something doesn't work as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, do not file here — see
        [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the tool name, inputs, and (if relevant) a minimal file.
      placeholder: |
        1. Call `code_read` with ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: efficient-token version
      placeholder: 1.0.1
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Node version, MCP host (e.g. Claude Code).
      placeholder: Windows 11, Node 20, Claude Code
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant stderr logs
      description: Server logs go to stderr. Paste anything relevant.
      render: shell
