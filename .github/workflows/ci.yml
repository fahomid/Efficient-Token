name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    # Node 24 is non-blocking: the bundled web-tree-sitter (0.25) WASM runtime
    # exhausts memory under Node 24's V8 when the smoke suite loads ~25 grammars
    # back to back. Real sessions load only a few grammars and are unaffected; the
    # runtime fix (web-tree-sitter 0.26) is ABI-incompatible with the prebuilt
    # tree-sitter-wasms grammars. Re-block once that chain supports Node 24.
    continue-on-error: ${{ matrix.node == 24 }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v5

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (smoke + e2e)
        run: npm test

  package:
    name: Verify package contents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack (dry run)
        run: npm pack --dry-run
