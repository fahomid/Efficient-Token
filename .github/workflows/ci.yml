name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    # Node 24 is non-blocking. web-tree-sitter 0.25's WASM runtime exhausts V8's
    # "Zone" memory when compiling the larger tree-sitter grammars (e.g. swift,
    # scala) under Node 24 — it fails even on a single grammar in an isolated
    # process, so the full outline sweep can't complete there. The runtime fix
    # (web-tree-sitter 0.26) is ABI-incompatible with the prebuilt
    # tree-sitter-wasms grammars. Real sessions load only a few grammars and are
    # unaffected; the package still works on Node 24. Re-block once that chain
    # supports Node 24.
    continue-on-error: ${{ matrix.node == 24 }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v5

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (smoke + e2e)
        run: npm test

  package:
    name: Verify package contents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack (dry run)
        run: npm pack --dry-run
